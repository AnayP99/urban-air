<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}">
  <link rel="canonical" href="{{ canonical_url }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page_title }}">
  <meta property="og:description" content="{{ page_description }}">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:site_name" content="{{ app_name }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ request.url_for('static', path='styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  {% block head_extra %}{% endblock %}
</head>
<body data-city-slug="{% if city is defined and city %}{{ city.slug }}{% elif selected_city is defined and selected_city %}{{ selected_city.slug }}{% endif %}">
  <div class="site-backdrop"></div>
  <header class="site-header">
    <div class="shell site-header-inner">
      <a href="/" class="brand-mark">
        <span>UrbanAir</span>
        <small>Outdoor timing for Indian cities</small>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/">Cities</a>
        <a href="/alerts">Demo</a>
        <a href="/guides/understanding-aqi">Guides</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ request.url_for('static', path='chart.js') }}"></script>
  <script src="{{ request.url_for('static', path='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
